<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- Avoid relayout around iOS safe areas -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />

    <title>Web Development Learning Portal – Serge Hall</title>
    <meta
      name="description"
      content="A personal learning portal by Serge Hall for studying web development and showcasing completed coursework using the webdev-coursework application."
    />
    <link rel="canonical" href="https://webdev-coursework.com/" />
    <meta name="robots" content="index,follow" />
    <meta name="author" content="Serge Hall" />

    <!-- Theming (set a default theme-color to prevent an early repaint on mobile) -->
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta
      name="theme-color"
      content="#ffffff"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#0a0a0a"
      media="(prefers-color-scheme: dark)"
    />

    <!-- Favicons / PWA -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />

    <!-- iOS -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Manifest -->
    <link rel="manifest" href="/site.webmanifest" crossorigin="anonymous" />

    <!-- Social (ensure images are compressed and long-cached) -->
    <meta property="og:title" content="Web Development Learning Portal" />
    <meta
      property="og:description"
      content="Explore and track completed web development coursework by Serge Hall using the webdev-coursework application."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://webdev-coursework.com" />
    <meta property="og:site_name" content="Webdev Coursework" />
    <meta
      property="og:image"
      content="https://webdev-coursework.com/screenshots/dashboard-wide.png"
    />
    <meta
      property="og:image:alt"
      content="Webdev Coursework dashboard screenshot"
    />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Web Dev Learning Portal – Serge Hall" />
    <meta
      name="twitter:description"
      content="Serge Hall's personal portal for learning and showcasing web development skills and completed coursework."
    />
    <meta
      name="twitter:image"
      content="https://webdev-coursework.com/screenshots/dashboard-wide.png"
    />
    <meta
      name="twitter:image:alt"
      content="Webdev Coursework dashboard screenshot"
    />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Webdev Coursework",
        "url": "https://webdev-coursework.com/",
        "description": "A personal learning portal by Serge Hall for studying web development and showcasing completed coursework.",
        "author": {
          "@type": "Person",
          "name": "Serge Hall"
        }
      }
    </script>

    <!-- Early theme apply to avoid flicker (tiny and synchronous) -->
    <script src="/theme-init.js"></script>

    <!-- Keep third-party beacons/scripts out of the initial path; load them after onload/idle in app code -->
  </head>

  <body>
    <div id="root"></div>
    <!-- Vite will inject modulepreload/preload links in production -->
    <script type="module" src="/src/main.tsx"></script>
    <noscript
      >This site requires JavaScript to run. Please enable JavaScript in your
      browser.</noscript
    >
  </body>
</html>
