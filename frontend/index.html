<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Web Development Learning Portal – Serge Hall</title>
  <meta
    name="description"
    content="A personal learning portal by Serge Hall for studying web development and showcasing completed coursework using the webdev-coursework application."
  />
  <meta name="robots" content="index,follow" />
  <meta name="author" content="Serge Hall" />

  <!-- Favicons / PWA -->
  <link rel="icon" href="/favicon_eagle.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />

  <!-- Theming -->
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />

  <!-- OG / Twitter -->
  <meta property="og:title" content="Web Development Learning Portal" />
  <meta
    property="og:description"
    content="Explore and track completed web development coursework by Serge Hall using the webdev-coursework application."
  />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://webdev-coursework.com" />
  <meta
    property="og:image"
    content="https://webdev-coursework.com/assets/Web-Developer-Learning-Portal.png"
  />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Web Dev Learning Portal – Serge Hall" />
  <meta
    name="twitter:description"
    content="Serge Hall's personal portal for learning and showcasing web development skills and completed coursework."
  />
  <meta
    name="twitter:image"
    content="https://webdev-coursework.com/assets/Web-Developer-Learning-Portal.png"
  />

  <!-- (опционально) Если реально используешь Cloudflare Beacon — оставь ниже:
  <meta http-equiv="x-dns-prefetch-control" content="on" />
  <link rel="dns-prefetch" href="https://static.cloudflareinsights.com" />
  -->
  <script>
    // Мини-скрипт ранней установки темы (без flicker), синхронизирован с твоим applySavedTheme
    (function () {
      try {
        var stored = localStorage.getItem("theme");
        var systemDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        var dark = stored ? stored === "dark" : systemDark;
        document.documentElement.classList.toggle("dark", dark);
      } catch (e) {}
    })();
  </script>
</head>

<body>
<div id="root"></div>
<script type="module" src="/src/main.tsx"></script>
</body>
</html>
