<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assignment: CSS Practice</title>
    <meta name="author" content="Siarhei Hancharou" />
    <meta name="description" content="CS 80 Assignment – CSS Practice" />
    <link rel="icon" href="https://www.google.com/favicon.ico" />

    <style>
      /* Problem 4.3 */
      body {
        font-size: 1.5em;
        color: red;
      }
      /* End of Problem 4.3 */

      /* Problem 4.4 */
      body {
        background-image: url("https://www.smc.edu/student-support/welcome-center/welcome-events/images/preview-days.png");
        background-repeat: repeat-x;
        background-attachment: fixed;
        background-position: center 50%;
      }
      /* End of Problem 4.4 */

      /* Problem 4.5 */
      h1,
      h2 {
        padding: 0.5em;
        border: 2px dashed black;
        margin: 0.5em;
      }
      /* End of Problem 4.5 */

      /* Problem 4.6 */
      .greenMove {
        color: green;
        position: relative;
        top: 25px;
        left: 15px;
      }
      /* End of Problem 4.6 */

      /* Problem 5.3 */
      .shadow-text {
        text-shadow: 2px 5px 6px deepskyblue;
      }
      /* End of Problem 5.3 */

      /* Problem 5.5 */
      .box {
        width: 100px;
        height: 100px;
        border: 3px solid black;
        margin: 10px;
        display: inline-block;
        text-align: center;
        line-height: 100px;
        font-weight: bold;
      }

      .box1 {
        background-color: lightblue;
        border-radius: 10px;
      }

      .box2 {
        background-color: lightgreen;
        border-radius: 50px;
      }

      .box3 {
        background-color: lightcoral;
        border-radius: 100px;
      }
      /* End of Problem 5.5 */
    </style>
  </head>
  <body>
    <!-- Problem 5.3 -->
    <h1 class="shadow-text">New features in CSS3</h1>
    <!-- End of Problem 5.3 -->

    <!-- Problem 4.5 -->
    <h1>Heading One</h1>
    <h2>Heading Two</h2>
    <!-- End of Problem 4.5 -->

    <!-- Problem 4.6 -->
    <p class="greenMove">This text is green and shifted.</p>
    <!-- End of Problem 4.6 -->

    <!-- Problem 5.5 -->
    <div class="box box1">10px</div>
    <div class="box box2">50px</div>
    <div class="box box3">100px</div>
    <!-- End of Problem 5.5 -->

    <footer>
      <p><strong>Student:</strong> Siarhei Hancharou</p>
      <p>
        <strong>Course:</strong> CS 80 – Internet Programming (Section 1239)
      </p>
      <p><strong>Instructor:</strong> Anthony Wang</p>
    </footer>
  </body>
</html>
