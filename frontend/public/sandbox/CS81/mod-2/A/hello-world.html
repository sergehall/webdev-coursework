<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello World Assignment</title>
  </head>
  <body>
    <h1>JavaScript Hello World</h1>
    <p id="output"></p>

    <script>
      // Create a variable to store your message
      let message = "Hello, World!";

      // Display the message using an alert popup
      alert(message);

      // Output the message to the browser's developer console
      console.log(message);

      // Also display the message in the page
      document.getElementById("output").textContent = message;
    </script>
  </body>
</html>
