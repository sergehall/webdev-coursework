<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slack Setup Checklist</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        background: #f0f4f8;
        color: #111827;
        padding: 2rem;
        line-height: 1.6;
      }
      .container {
        max-width: 640px;
        margin: auto;
        background: #ffffff;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        padding: 2rem;
      }
      h1 {
        text-align: center;
        color: #10b981;
      }
      ul {
        padding-left: 1.25rem;
      }
      li {
        margin-bottom: 0.5rem;
      }
      input[type="checkbox"] {
        margin-right: 0.5rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Module 1B – Slack Setup</h1>
      <ul>
        <li>
          <label
            ><input type="checkbox" checked disabled /> Signed up for Slack
            using SMC or preferred email</label
          >
        </li>
        <li>
          <label
            ><input type="checkbox" checked disabled /> Joined the
            'smccs81sum2025' Slack workspace</label
          >
        </li>
        <li>
          <label
            ><input type="checkbox" checked disabled /> Set display name to full
            name (matching Canvas)</label
          >
        </li>
        <li>
          <label
            ><input type="checkbox" checked disabled /> Verified account and
            profile setup</label
          >
        </li>
        <li>
          <label
            ><input type="checkbox" checked disabled /> Screenshot with
            workspace name and your display name taken</label
          >
        </li>
      </ul>
    </div>
  </body>
</html>
