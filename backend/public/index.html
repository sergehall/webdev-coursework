<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Webdev Coursework API</title>
    <link rel="stylesheet" href="/assets/index.css" />
  </head>
  <body>
    <main class="card">
      <h1>Webdev Coursework API</h1>
      <p class="subtitle">Public educational API with open Swagger documentation</p>

      <p class="status">
        <span id="status-led-value" class="status-led is-checking" aria-hidden="true"></span>
        <span id="status-label-value">Checking server</span>
        <span id="status-chip-value" class="status-chip is-checking">CHECK</span>
      </p>

      <div class="actions">
        <a id="swagger-link-value" class="btn btn-primary" href="/docs">Swagger</a>
        <a class="btn" href="/info">Info</a>
        <a class="btn" href="/health">Health</a>
        <a class="btn btn-site" href="https://webdev-coursework.com">Main Site</a>
      </div>

      <div class="meta-list">
        <p>Last checked: <strong id="last-checked-value">checking...</strong></p>
        <p>Uptime: <strong id="uptime-meta-value">checking...</strong></p>
        <p>Release: <strong id="release-meta-value">checking...</strong></p>
      </div>
    </main>

    <script src="/assets/index.js"></script>
  </body>
</html>
