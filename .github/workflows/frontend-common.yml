# .github/workflows/frontend-common.yml
name: Frontend Common Workflow

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      run_lint:
        required: true
        type: boolean
      run_tests:
        required: true
        type: boolean
      run_build:
        required: true
        type: boolean
    secrets:
      VITE_API_URL:
        required: true
      VITE_QUIZ_SECRET:
        required: true
      VITE_SENTRY_DSN:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: ./frontend
    env:
      VITE_ENVIRONMENT: ${{ inputs.environment }}
      VITE_API_URL: ${{ secrets.VITE_API_URL }}
      VITE_QUIZ_SECRET: ${{ secrets.VITE_QUIZ_SECRET }}
      VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.0

      - name: Enable Corepack + Yarn (Berry)
        run: |
          corepack enable
          corepack prepare yarn@4.12.0 --activate
          yarn -v

      - name: Cache Yarn
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/yarn
            .yarn/cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install deps
        run: yarn install --immutable

      - name: Lint
        if: inputs.run_lint
        run: yarn lint

      - name: Tests
        if: inputs.run_tests
        run: yarn test:run

      - name: Build
        if: inputs.run_build
        run: |
          echo "VITE_ENVIRONMENT=$VITE_ENVIRONMENT" >> .env
          echo "VITE_API_URL=$VITE_API_URL" >> .env
          echo "VITE_QUIZ_SECRET=$VITE_QUIZ_SECRET" >> .env
          echo "VITE_SENTRY_DSN=$VITE_SENTRY_DSN" >> .env
          yarn build

      # Pack dist into a single tarball (avoids uploading hundreds of files)
      - name: Pack dist
        if: inputs.run_build
        run: |
          test -d dist || (echo "dist/ not found" && exit 1)
          tar -czf dist.tgz -C dist .

      # Upload for PRs: short retention, PR-specific name
      - name: Upload artifact (PR)
        if: inputs.run_build && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: pr-${{ github.event.pull_request.number }}
          path: ./frontend/dist.tgz
          compression-level: 0   # already compressed
          retention-days: 1
          if-no-files-found: error
          overwrite: true

      # Upload for main/tags: stable name, 7-day retention
      - name: Upload artifact (main/tags)
        if: inputs.run_build && github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: ./frontend/dist.tgz
          compression-level: 0
          retention-days: 7
          if-no-files-found: error
          overwrite: true
