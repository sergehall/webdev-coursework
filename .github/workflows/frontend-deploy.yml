# .github/workflows/frontend-deploy.yml
name: Frontend Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/frontend-common.yml
    with:
      environment: production
      run_lint: false
      run_tests: false
      run_build: true
    secrets:
      VITE_API_URL: ${{ secrets.VITE_API_URL }}
      VITE_QUIZ_SECRET: ${{ secrets.VITE_QUIZ_SECRET }}
      VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist         # stable name from common workflow
          path: ./artifacts

      - name: Unpack to ./frontend/dist
        run: |
          mkdir -p ./frontend/dist
          tar -xzf ./artifacts/dist.tgz -C ./frontend/dist
          rm -f ./artifacts/dist.tgz

      # add your deploy step here
      # - name: Deploy to <provider>
      #   run: echo "Deploying ./frontend/dist ..."
